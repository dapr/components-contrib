# yaml-language-server: $schema=../../component-metadata-schema.json
schemaVersion: v1
type: lock
name: redis
version: v1
status: alpha
title: "Redis Distributed Lock"
urls:
  - title: Reference
    url: https://docs.dapr.io/reference/components-reference/supported-locks/redis-lock/
lock:
  operations:
    - name: tryLock
      description: "Attempt to acquire a distributed lock"
    - name: unlock
      description: "Release a distributed lock"
authenticationProfiles:
  - title: "Password Authentication"
    description: |
      Authenticate using Redis password.
    metadata:
      - name: redisUsername
        required: false
        description: "The Redis username"
        example: "redis-user"
      - name: redisPassword
        required: false
        sensitive: true
        description: "The Redis password"
        example: "redis-password"
  - title: "Sentinel Authentication"
    description: |
      Authenticate using Redis Sentinel password.
    metadata:
      - name: sentinelUsername
        required: false
        description: "The Redis Sentinel username"
        example: "sentinel-user"
      - name: sentinelPassword
        required: false
        sensitive: true
        description: "The Redis Sentinel password"
        example: "sentinel-password"
  - title: "TLS Authentication"
    description: |
      Authenticate using Redis TLS certificate.
    metadata:
      - name: clientCert
        required: false
        sensitive: true
        description: "The Redis client certificate"
        example: '"-----BEGIN CERTIFICATE-----\nXXX..."'
      - name: clientKey
        required: false
        sensitive: true
        description: "The Redis client key"
        example: '"-----BEGIN PRIVATE KEY-----\nXXX..."'
  - title: "OIDC private_key_jwt"
    description: |
      Authenticate using OpenID Connect with the private_key_jwt client authentication
      method (RFC 7523). An OAuth2 access token is obtained from the identity provider
      using a signed JWT client assertion and used as the password for the Redis AUTH
      command. The token is refreshed in the background before it expires.
    metadata:
      - name: useOIDC
        type: bool
        required: false
        description: |
          If set to true, enables OIDC private_key_jwt authentication.
          Must not be combined with "redisPassword" or "useEntraID".
        example: '"true"'
        default: '"false"'
      - name: oidcTokenEndpoint
        type: string
        required: true
        description: |
          URL of the OAuth2 identity provider access token endpoint.
        example: '"https://identity.example.com/v1/token"'
      - name: oidcClientID
        type: string
        required: true
        description: |
          The OAuth2 client ID that has been provisioned in the identity provider.
        example: '"my-client-id"'
      - name: oidcClientAssertionCert
        type: string
        required: true
        description: |
          PEM-encoded X.509 certificate paired with the client assertion signing key.
          Use secretKeyRef for secret reference.
        example: |
          -----BEGIN CERTIFICATE-----\n...
      - name: oidcClientAssertionKey
        type: string
        required: true
        sensitive: true
        description: |
          PEM-encoded RSA private key used to sign the client assertion.
          Use secretKeyRef for secret reference.
        example: |
          -----BEGIN PRIVATE KEY-----\n...
      - name: oidcResource
        type: string
        required: false
        description: |
          Optional OAuth2 resource parameter to include in the token request when
          required by the identity provider.
        example: '"URI:RS-12345-API"'
      - name: oidcAudience
        type: string
        required: false
        description: |
          Overrides the JWT client assertion audience (aud). Defaults to the token
          endpoint URL.
        example: '"https://identity.example.com/realms/local"'
      - name: oidcScopes
        type: string
        required: false
        description: |
          Comma-delimited list of OAuth2/OIDC scopes to request with the access token.
          Although not required, this field is recommended.
        example: '"openid,redis-prod"'
        default: '"openid"'
      - name: oidcKid
        type: string
        required: false
        description: |
          The JWT key ID (kid) header to use for the client assertion, when required by
          the identity provider (for example, the thumbprint of the client certificate).
        example: '"1234567890"'
      - name: oidcCACert
        type: string
        required: false
        description: |
          PEM-encoded CA certificate used to verify the TLS connection to the token
          endpoint. This is distinct from the TLS configuration of the Redis
          connection itself.
        example: |
          -----BEGIN CERTIFICATE-----\n...
      - name: redisUsername
        type: string
        required: false
        description: |
          Username to pass to the Redis AUTH command together with the access token.
          Defaults to "default" when using OIDC authentication.
        example: '"default"'
        default: '"default"'
metadata:
  - name: redisHost
    required: true
    description: |
      Connection-string for the redis host. If "redisType" is "cluster" it
      can be multiple hosts separated by commas or just a single host.
      The port can be included in the host string (e.g. "host:6379") or
      provided separately via "redisPort".
    example: '"localhost:6379"'
    type: string
  - name: redisPort
    required: false
    description: |
      The Redis port. Optional: if "redisHost" already contains a port, this
      field must either match or be omitted. When "redisHost" does not include
      a port and this field is not set, the default Redis port 6379 is used.
    example: "6379"
    type: string
  - name: redisType
    required: false
    description: "The Redis type"
    example: "node"
    default: "node"
    allowedValues:
      - "node"
      - "cluster"
      - "sentinel"
  - name: redisDB
    required: false
    description: "The Redis database number"
    example: '0'
    default: '0'
  - name: redisMaxRetries
    required: false
    description: "Maximum Redis retries"
    example: '3'
    default: '3'
  - name: redisMinRetryInterval
    required: false
    description: "Minimum Redis retry interval"
    example: "8ms"
    default: "8ms"
  - name: redisMaxRetryInterval
    required: false
    description: "Maximum Redis retry interval"
    example: "512ms"
    default: "512ms"
  - name: dialTimeout
    required: false
    description: "Dial timeout duration"
    example: "5s"
    default: "5s"
  - name: readTimeout
    required: false
    description: "Read timeout duration"
    example: "3s"
    default: "3s"
  - name: writeTimeout
    required: false
    description: "Write timeout duration"
    example: "3s"
    default: "3s"
  - name: poolSize
    required: false
    description: "Connection pool size"
    example: '10'
    default: '10'
  - name: poolTimeout
    required: false
    description: "Connection pool timeout"
    example: "4s"
    default: "4s"
  - name: maxConnAge
    required: false
    description: "Maximum connection age"
    example: "30m"
    default: "30m"
  - name: minIdleConns
    required: false
    description: "Minimum idle connections"
    example: '0'
    default: '0'
  - name: idleTimeout
    required: false
    description: "Idle timeout duration"
    example: "5m"
    default: "5m"
  - name: idleCheckFrequency
    required: false
    description: "Idle check frequency"
    example: "1m"
    default: "1m"
  - name: maxRetries
    required: false
    description: "Maximum number of retries when attempting to acquire a lock"
    example: '3'
    default: '3'
  - name: maxRetryBackoff
    required: false
    description: "Maximum backoff duration between retries"
    example: "2s"
    default: "2s"
  - name: redeliverInterval
    required: false
    description: "Redeliver interval for re-attempting lock acquisition"
    example: "15s"
    default: "15s"
  - name: processingTimeout
    required: false
    description: "Processing timeout for lock ownership"
    example: "60s"
    default: "60s"
  - name: enableTLS
    required: false
    type: bool
    description: "Whether to enable TLS encryption"
    example: "false"
    default: "false"
  - name: insecureSkipTLSVerify
    required: false
    type: bool
    description: "Skip TLS certificate verification (insecure). Only use for testing."
    example: "false"
    default: "false"
  - name: useEntraID
    required: false
    type: bool
    description: "Whether to use Entra ID for authentication"
    example: "false"
    default: "false"
  - name: failover
    required: false
    type: bool
    description: "Whether to enable failover mode (for Sentinel)"
    example: "false"
    default: "false"
  - name: sentinelMasterName
    required: false
    description: "The Sentinel master name (used if redisType is 'sentinel')"
    example: "mymaster"
