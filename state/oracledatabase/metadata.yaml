# yaml-language-server: $schema=../../../component-metadata-schema.json
schemaVersion: v1
type: state
name: oracledatabase
version: v1
status: alpha
title: "Oracle Database"
urls:
  - title: Reference
    url: https://docs.dapr.io/reference/components-reference/supported-state-stores/setup-oracledatabase/
authenticationProfiles:
  - title: "Connection String"
    description: "Connect to Oracle Database using a connection string."
    metadata:
      - name: connectionString
        type: string
        required: true
metadata:
  - name: tableName
    type: string
    required: false
    description: The table name to store state data.
    example: "dapr_state"
    default: "state"
  - name: oracleWalletLocation
    type: string
    required: false
    description: The location of the Oracle wallet.
    example: "/path/to/wallet"
    default: ""
  - name: bulkGetChunkSize
    type: number
    required: false
    description: |
      Maximum number of keys per internal SQL query when using BulkGet.
      When the total number of requested keys exceeds this value, multiple
      chunked queries are executed sequentially. Valid values are between 1
      and 1000 (Oracle's documented IN-list expression limit). Values less
      than or equal to 0 use the default value of 1000. Values above 1000
      are clamped with a warning log.
    example: "100"
    default: "1000"
