version: "2"

run:
  concurrency: 4
  timeout: 15m
  issues-exit-code: 1
  tests: true
  build-tags:
    - certtests
    - conftests
    - metadata

output:
  formats:
    text:
      path: stdout
      colors: true
      print-linter-name: true
      print-issued-lines: true
  sort-order:
    - linter
    - file

linters:
  default: all
  exclusions:
    paths:
      - ^vendor$
  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
      exclude-functions:
        - fmt:.*
        - io/ioutil:^Read.*
    funlen:
      lines: 60
      statements: 40
    govet:
      settings:
        printf:
          funcs:
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Infof
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Warnf
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Errorf
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Fatalf
      enable:
        - atomicalign
        - shadow
      enable-all: false
      disable:
        - shadow
      disable-all: false
    revive:
      confidence: 0.8
    gocyclo:
      min-complexity: 10
    gocognit:
      min-complexity: 10
    dupl:
      threshold: 100
    goconst:
      min-len: 3
      min-occurrences: 5
    depguard:
      rules:
        main:
          deny:
            - pkg: github.com/golang-jwt/jwt/v5
              desc: must use github.com/lestrrat-go/jwx/v2/jwt
            - pkg: github.com/golang-jwt/jwt/v4
              desc: must use github.com/lestrrat-go/jwx/v2/jwt
            - pkg: github.com/Sirupsen/logrus
              desc: must use github.com/dapr/kit/logger
            - pkg: github.com/agrea/ptr
              desc: must use github.com/dapr/kit/ptr
            - pkg: go.uber.org/atomic
              desc: must use sync/atomic
            - pkg: golang.org/x/net/context
              desc: must use context
            - pkg: github.com/pkg/errors
              desc: must use standard library (errors package and/or fmt.Errorf)
            - pkg: golang.org/x/exp/slices
              desc: must use slices from standard library
            - pkg: github.com/go-chi/chi$
              desc: must use github.com/go-chi/chi/v5
            - pkg: github.com/cenkalti/backoff$
              desc: must use github.com/cenkalti/backoff/v4
            - pkg: github.com/cenkalti/backoff/v2
              desc: must use github.com/cenkalti/backoff/v4
            - pkg: github.com/cenkalti/backoff/v3
              desc: must use github.com/cenkalti/backoff/v4
            - pkg: github.com/benbjohnson/clock
              desc: must use k8s.io/utils/clock
            - pkg: github.com/ghodss/yaml
              desc: must use sigs.k8s.io/yaml
            - pkg: gopkg.in/yaml.v2
              desc: must use gopkg.in/yaml.v3
            - pkg: github.com/golang-jwt/jwt
              desc: must use github.com/lestrrat-go/jwx/v2
            - pkg: github.com/golang-jwt/jwt/v2
              desc: must use github.com/lestrrat-go/jwx/v2
            - pkg: github.com/golang-jwt/jwt/v3
              desc: must use github.com/lestrrat-go/jwx/v2
            - pkg: github.com/golang-jwt/jwt/v4
              desc: must use github.com/lestrrat-go/jwx/v2
            - pkg: github.com/gogo/status
              desc: must use google.golang.org/grpc/status
            - pkg: github.com/gogo/protobuf
              desc: must use google.golang.org/protobuf
            - pkg: github.com/lestrrat-go/jwx/jwa
              desc: must use github.com/lestrrat-go/jwx/v2
            - pkg: github.com/lestrrat-go/jwx/jwt
              desc: must use github.com/lestrrat-go/jwx/v2
            - pkg: github.com/labstack/gommon/log
              desc: must use github.com/dapr/kit/logger
            - pkg: github.com/gobuffalo/logger
              desc: must use github.com/dapr/kit/logger
    misspell:
      ignore-rules:
        - someword
    lll:
      line-length: 120
      tab-width: 1
    unparam:
      check-exported: false
    nakedret:
      max-func-lines: 30
    prealloc:
      simple: true
      range-loops: true
      for-loops: false
    gocritic:
      disabled-checks:
        - regexpMust
        - rangeValCopy
        - hugeParam
        - ifElseChain
        - singleCaseSwitch
        - exitAfterDefer
      enabled-tags:
        - performance
      settings:
        captLocal:
          paramsOnly: true
    godox:
      keywords:
        - NOTE
        - OPTIMIZE
        - HACK
    godot:
      exclude:
        - nosec
        - \}
      capital: false
      scope: all
    dogsled:
      max-blank-identifiers: 2
    whitespace:
      multi-if: false
      multi-func: false
    wsl:
      strict-append: true
      allow-assign-and-call: true
      allow-multiline-assign: true
      allow-trailing-comment: true
      allow-cuddle-declarations: false
    testifylint:
      disable:
        - float-compare
        - negative-positive
        - go-require
  disable:
    - dupl
    - musttag
    - errcheck
    - funlen
    - gochecknoglobals
    - gochecknoinits
    - gocyclo
    - gocognit
    - godox
    - lll
    - unparam
    - wsl
    - mnd
    - testpackage
    - err113
    - nestif
    - nlreturn
    - exhaustive
    - exhaustruct
    - noctx
    - tparallel
    - paralleltest
    - wrapcheck
    - tagliatelle
    - ireturn
    - errchkjson
    - contextcheck
    - gomoddirectives
    - godot
    - cyclop
    - varnamelen
    - errorlint
    - forcetypeassert
    - maintidx
    - nilnil
    - predeclared
    - thelper
    - wastedassign
    - containedctx
    - nonamedreturns
    - asasalint
    - rowserrcheck
    - sqlclosecheck
    - goconst
    - tagalign
    - inamedparam
    - canonicalheader
    - fatcontext
    # Introduced in golangci-lint v2.
    - funcorder
    - arangolint
    - embeddedstructfieldcheck
    - noinlineerr
    - godoclint
    - unqueryvet
    - iotamixing
    - modernize
    - wsl_v5

formatters:
  exclusions:
    paths:
      - ^vendor$
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/dapr/
