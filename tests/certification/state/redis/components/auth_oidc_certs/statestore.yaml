apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore
spec:
  type: state.redis
  version: v1
  metadata:
    - name: redisHost
      value: "localhost:6390"
    - name: useOIDC
      value: "true"
    - name: oidcTokenEndpoint
      value: "http://localhost:8080/realms/local/protocol/openid-connect/token"
    - name: oidcClientID
      value: "dapr-redis-client-jwt"
    - name: oidcClientAssertionCert
      secretKeyRef:
        name: OIDC_CLIENT_ASSERTION_CERT
        key: OIDC_CLIENT_ASSERTION_CERT
    - name: oidcClientAssertionKey
      secretKeyRef:
        name: OIDC_CLIENT_ASSERTION_KEY
        key: OIDC_CLIENT_ASSERTION_KEY
    - name: oidcAudience
      value: "http://localhost:8080/realms/local/protocol/openid-connect/token"
    - name: oidcScopes
      value: "openid"
    - name: oidcKid
      secretKeyRef:
        name: OIDC_CLIENT_KID
        key: OIDC_CLIENT_KID

auth:
  secretStore: envvar-secret-store
