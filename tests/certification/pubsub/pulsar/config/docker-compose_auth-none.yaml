services:
  standalone:
    image: apachepulsar/pulsar:4.0.0
    ports:
      - "6650:6650"
      - "8080:8080"
    environment:
      - PULSAR_MEM=-Xms512m -Xmx512m -XX:MaxDirectMemorySize=512m
    command: >
      /bin/bash -c
      "bin/apply-config-from-env.py conf/standalone.conf
      && bin/pulsar standalone --advertised-address 127.0.0.1"
    volumes:
      - pulsardata:/pulsar/data
      - pulsarconf:/pulsar/conf
volumes:
  pulsardata:
  pulsarconf:
