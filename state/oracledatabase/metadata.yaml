# yaml-language-server: $schema=../../../component-metadata-schema.json
schemaVersion: v1
type: state
name: oracledatabase
version: v1
status: alpha
title: "Oracle Database"
urls:
  - title: Reference
    url: https://docs.dapr.io/reference/components-reference/supported-state-stores/setup-oracledatabase/
authenticationProfiles:
  - title: "Connection String"
    description: "Connect to Oracle Database using a connection string."
    metadata:
      - name: connectionString
        type: string
        required: true
metadata:
  - name: tableName
    type: string
    required: false
    description: The table name to store state data.
    example: "dapr_state"
    default: "state"
  - name: oracleWalletLocation
    type: string
    required: false
    description: The location of the Oracle wallet.
    example: "/path/to/wallet"
    default: ""
  - name: bulkGetChunkSize
    type: number
    required: false
    description: |
      Maximum number of keys per internal SQL query when using BulkGet.
      When the total number of requested keys exceeds this value, multiple
      chunked queries are executed sequentially. Valid values are between 1
      and 1000 (Oracle's documented IN-list expression limit). Values less
      than or equal to 0 use the default value of 1000. Values above 1000
      are clamped with a warning log.
    example: "100"
    default: "1000"
  - name: maxOpenConns
    type: number
    required: false
    description: |
      Maximum number of open connections to the Oracle database.
      Maps to db.SetMaxOpenConns in database/sql.
      A value of 0 or omitting this field leaves the Go default (unlimited).
    example: "10"
    default: "0"
  - name: maxIdleConns
    type: number
    required: false
    description: |
      Maximum number of idle connections in the connection pool.
      Maps to db.SetMaxIdleConns in database/sql.
      A value of 0 or omitting this field leaves the Go default (2).
    example: "5"
    default: "0"
  - name: connMaxLifetime
    type: duration
    required: false
    description: |
      Maximum amount of time a connection may be reused before it is closed.
      Maps to db.SetConnMaxLifetime in database/sql.
      A value of 0 or omitting this field leaves the Go default (unlimited).
    example: "30m"
    default: "0s"
  - name: connMaxIdleTime
    type: duration
    required: false
    description: |
      Maximum amount of time a connection may be idle before it is closed.
      Maps to db.SetConnMaxIdleTime in database/sql.
      A value of 0 or omitting this field leaves the Go default (unlimited).
    example: "10m"
    default: "0s"
