services:
  cockroachdb:
    image: cockroachdb/cockroach:v23.2.29
    hostname: cockroachdb
    command: start-single-node --cluster-name=single-node --logtostderr=WARNING --log-file-verbosity=WARNING --insecure
    restart: always
    ports:
      - "26257:26257"
    healthcheck:
      test: ["CMD", "cockroach", "sql", "--insecure", "--host=localhost:26257", "-e", "SELECT 1"]
      interval: 3s
      timeout: 3s
      retries: 15

  cockroachdb-init:
    hostname: cockroachdb-init
    image: timveil/cockroachdb-remote-client:latest
    environment:
      - COCKROACH_HOST=cockroachdb:26257
      - COCKROACH_INSECURE=true
      - DATABASE_NAME=dapr_test
    depends_on:
      cockroachdb:
        condition: service_healthy
