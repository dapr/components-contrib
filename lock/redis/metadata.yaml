# yaml-language-server: $schema=../../component-metadata-schema.json
schemaVersion: v1
type: lock
name: redis
version: v1
status: alpha
title: "Redis Distributed Lock"
urls:
  - title: Reference
    url: https://docs.dapr.io/reference/components-reference/supported-locks/redis-lock/
lock:
  operations:
    - name: tryLock
      description: "Attempt to acquire a distributed lock"
    - name: unlock
      description: "Release a distributed lock"
authenticationProfiles:
  - title: "Password Authentication"
    description: |
      Authenticate using Redis password.
    metadata:
      - name: redisUsername
        required: false
        description: "The Redis username"
        example: "redis-user"
      - name: redisPassword
        required: false
        sensitive: true
        description: "The Redis password"
        example: "redis-password"
  - title: "Sentinel Authentication"
    description: |
      Authenticate using Redis Sentinel password.
    metadata:
      - name: sentinelUsername
        required: false
        description: "The Redis Sentinel username"
        example: "sentinel-user"
      - name: sentinelPassword
        required: false
        sensitive: true
        description: "The Redis Sentinel password"
        example: "sentinel-password"
  - title: "TLS Authentication"
    description: |
      Authenticate using Redis TLS certificate.
    metadata:
      - name: clientCert
        required: false
        sensitive: true
        description: "The Redis client certificate"
        example: '"-----BEGIN CERTIFICATE-----\nXXX..."'
      - name: clientKey
        required: false
        sensitive: true
        description: "The Redis client key"
        example: '"-----BEGIN PRIVATE KEY-----\nXXX..."'
metadata:
  - name: redisHost
    required: true
    description: |
      Connection-string for the redis host. If "redisType" is "cluster" it
      can be multiple hosts separated by commas or just a single host.
      The port can be included in the host string (e.g. "host:6379") or
      provided separately via "redisPort".
    example: '"localhost:6379"'
    type: string
  - name: redisPort
    required: false
    description: |
      The Redis port. Optional: if "redisHost" already contains a port, this
      field must either match or be omitted. When "redisHost" does not include
      a port and this field is not set, the default Redis port 6379 is used.
    example: "6379"
    type: string
  - name: redisType
    required: false
    description: "The Redis type"
    example: "node"
    default: "node"
    allowedValues:
      - "node"
      - "cluster"
      - "sentinel"
  - name: redisDB
    required: false
    description: "The Redis database number"
    example: '0'
    default: '0'
  - name: redisMaxRetries
    required: false
    description: "Maximum Redis retries"
    example: '3'
    default: '3'
  - name: redisMinRetryInterval
    required: false
    description: "Minimum Redis retry interval"
    example: "8ms"
    default: "8ms"
  - name: redisMaxRetryInterval
    required: false
    description: "Maximum Redis retry interval"
    example: "512ms"
    default: "512ms"
  - name: dialTimeout
    required: false
    description: "Dial timeout duration"
    example: "5s"
    default: "5s"
  - name: readTimeout
    required: false
    description: "Read timeout duration"
    example: "3s"
    default: "3s"
  - name: writeTimeout
    required: false
    description: "Write timeout duration"
    example: "3s"
    default: "3s"
  - name: poolSize
    required: false
    description: "Connection pool size"
    example: '10'
    default: '10'
  - name: poolTimeout
    required: false
    description: "Connection pool timeout"
    example: "4s"
    default: "4s"
  - name: maxConnAge
    required: false
    description: "Maximum connection age"
    example: "30m"
    default: "30m"
  - name: minIdleConns
    required: false
    description: "Minimum idle connections"
    example: '0'
    default: '0'
  - name: idleTimeout
    required: false
    description: "Idle timeout duration"
    example: "5m"
    default: "5m"
  - name: idleCheckFrequency
    required: false
    description: "Idle check frequency"
    example: "1m"
    default: "1m"
  - name: maxRetries
    required: false
    description: "Maximum number of retries when attempting to acquire a lock"
    example: '3'
    default: '3'
  - name: maxRetryBackoff
    required: false
    description: "Maximum backoff duration between retries"
    example: "2s"
    default: "2s"
  - name: redeliverInterval
    required: false
    description: "Redeliver interval for re-attempting lock acquisition"
    example: "15s"
    default: "15s"
  - name: processingTimeout
    required: false
    description: "Processing timeout for lock ownership"
    example: "60s"
    default: "60s"
  - name: enableTLS
    required: false
    type: bool
    description: "Whether to enable TLS encryption"
    example: "false"
    default: "false"
  - name: insecureSkipTLSVerify
    required: false
    type: bool
    description: "Skip TLS certificate verification (insecure). Only use for testing."
    example: "false"
    default: "false"
  - name: useEntraID
    required: false
    type: bool
    description: "Whether to use Entra ID for authentication"
    example: "false"
    default: "false"
  - name: useOIDC
    required: false
    type: bool
    description: "If set, enables OAuth2 private_key_jwt authentication (RFC 7523). Mutually exclusive with useEntraID and static redisPassword."
    example: "false"
    default: "false"
  - name: oidcTokenEndpoint
    required: false
    type: string
    description: "OAuth2 token endpoint of the IDP. Required when useOIDC is true."
    example: "https://idp.example.com/oauth2/token"
  - name: oidcClientID
    required: false
    type: string
    description: "Client identifier registered with the IDP. Used as the iss and sub claims of the signed client assertion. Required when useOIDC is true."
    example: "dapr-redis-client"
  - name: oidcClientAssertionCert
    required: false
    type: string
    description: "PEM-encoded X.509 client certificate whose public key is registered with the IDP. Required when useOIDC is true."
    example: "-----BEGIN CERTIFICATE-----\n..."
  - name: oidcClientAssertionKey
    required: false
    type: string
    description: "PEM-encoded RSA private key corresponding to oidcClientAssertionCert. Required when useOIDC is true."
    example: "-----BEGIN RSA PRIVATE KEY-----\n..."
  - name: oidcResource
    required: false
    type: string
    description: "Resource URI form parameter sent on the token request. Required by ADFS / IdAnywhere style endpoints."
    example: "JPMC:URI:RS-103863-10002-API2APISandBox-DEV"
  - name: oidcAudience
    required: false
    type: string
    description: "Override for the aud claim on the signed client assertion. When empty, defaults to the token endpoint URL."
    example: "https://idp.example.com/oauth2/token"
  - name: oidcKid
    required: false
    type: string
    description: "Optional kid header on the signed client assertion. Required by ADFS / IdAnywhere (SHA-1 thumbprint of the X.509 certificate, hex-encoded with colons removed)."
    example: "deadbeefcafebabe"
  - name: oidcScopes
    required: false
    type: string
    description: "Comma-separated list of OAuth2 scopes to request."
    default: "openid"
    example: "openid,profile"
  - name: oidcCACert
    required: false
    type: string
    description: "Optional PEM-encoded CA bundle used to verify the TLS certificate of the OIDC token endpoint."
    example: "-----BEGIN CERTIFICATE-----\n..."
  - name: failover
    required: false
    type: bool
    description: "Whether to enable failover mode (for Sentinel)"
    example: "false"
    default: "false"
  - name: sentinelMasterName
    required: false
    description: "The Sentinel master name (used if redisType is 'sentinel')"
    example: "mymaster"
