# for tooling that walks tests/certification/. Init against this spec will
# fail intentionally because the URL points at a non-existent path.
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: configstore
spec:
  type: configuration.git
  version: v1
  metadata:
    - name: url
      value: "file:///__cert_test_placeholder_replaced_at_runtime__"
    - name: authMode
      value: "none"
