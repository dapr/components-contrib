services:
  cockroachdb:
    image: cockroachdb/cockroach:v23.2.29
    hostname: cockroachdb
    command: ["start-single-node", "--cluster-name=single-node", "--insecure", "--log=sinks: {stderr: {filter: WARNING}}"]
    restart: always
    security_opt:
      - no-new-privileges
    ports:
      - "26257:26257"
    healthcheck:
      test: ["CMD", "cockroach", "sql", "--insecure", "--host=localhost:26257", "-e", "SELECT 1"]
      start_period: 30s
      interval: 5s
      timeout: 5s
      retries: 20

  cockroachdb-init:
    hostname: cockroachdb-init
    image: timveil/cockroachdb-remote-client:latest
    environment:
      - COCKROACH_HOST=cockroachdb:26257
      - COCKROACH_INSECURE=true
      - DATABASE_NAME=dapr_test
    depends_on:
      cockroachdb:
        condition: service_healthy
