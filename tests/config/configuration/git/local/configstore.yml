apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: configstore
spec:
  type: configuration.git
  version: v1
  metadata:
    - name: url
      value: "${{GIT_UPSTREAM_URL}}"
    - name: branch
      value: "main"
    - name: path
      value: "."
    - name: mappingMode
      value: "file"
    - name: pollInterval
      value: "250ms"  # Allowed because the conformance harness uses file:// URLs
    - name: emitInitialState
      value: "false"
    - name: authMode
      value: "none"
